name: test

on:
  push:
    branches:
      - dev
      - main
      - "stage/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

      - run: go build ./cmd/disgord-lyrics
