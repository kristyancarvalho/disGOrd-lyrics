name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail
          make dist \
            VERSION="${GITHUB_REF_NAME}" \
            COMMIT="$(git rev-parse --short HEAD)" \
            DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.zip dist/checksums.txt --title "$GITHUB_REF_NAME" --generate-notes
