name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail
          make dist \
            VERSION="${GITHUB_REF_NAME}" \
            COMMIT="$(git rev-parse --short HEAD)" \
            DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "$GITHUB_REF_NAME"
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            --title "DisGOrd Lyrics ${GITHUB_REF_NAME}"
            --verify-tag
            --generate-notes
          )
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_file" ]; then
            args+=(--notes "$(cat "$notes_file")")
          fi
          gh release create "${args[@]}"
